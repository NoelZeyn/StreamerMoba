<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Sistem Stream Vasta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
        }

        .bg-glow {
            background: radial-gradient(circle at 50% 50%, #1e40af 0%, #0f172a 70%);
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .custom-loader {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(#0000 10%, #3b82f6);
            -webkit-mask: radial-gradient(farthest-side,#0000 calc(100% - 8px),#000 0);
            animation: s3 1s infinite linear;
        }

        @keyframes s3 {to{transform: rotate(1turn)}}
    </style>
</head>
<body class="bg-glow min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 max-w-2xl w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="relative animate-float">
                <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20"></div>
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-2xl relative">
                    <i class="fas fa-tools text-5xl text-blue-500"></i>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight uppercase">
                Sistem Sedang <span class="text-blue-500">Update</span>
            </h1>
            <p class="text-gray-400 text-lg max-w-md mx-auto leading-relaxed">
                Kami sedang melakukan pemeliharaan rutin untuk meningkatkan performa integrasi <b>Saweria</b> & <b>SociaBuzz</b> Anda.
            </p>
        </div>

        <div class="mt-10 bg-gray-900/50 backdrop-blur-xl border border-white/5 p-6 rounded-2xl max-w-sm mx-auto shadow-xl">
            <div class="flex items-center justify-center gap-4 mb-4">
                <div class="custom-loader"></div>
                <div class="text-left">
                    <p class="text-xs font-bold text-blue-400 uppercase tracking-widest">Current Status</p>
                    <p class="text-white font-semibold">Migrasi Database & API</p>
                </div>
            </div>
            
            <div class="w-full bg-gray-800 rounded-full h-1.5 mb-2 overflow-hidden">
                <div class="bg-blue-500 h-full rounded-full animate-[progress_2s_ease-in-out_infinite]" style="width: 75%"></div>
            </div>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Estimasi selesai: 15-30 Menit</p>
        </div>

        <div class="mt-12 flex flex-col items-center gap-6">
            <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.3em]">Butuh bantuan mendesak?</p>
            <div class="flex gap-4">
                <a href="#" class="w-10 h-10 bg-gray-800 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition-all">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="#" class="w-10 h-10 bg-gray-800 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition-all">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="#" class="w-10 h-10 bg-gray-800 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition-all">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>

        <footer class="mt-16 pt-8 border-t border-white/5">
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">
                &copy; 2026 Vasta Sistem Stream - Koryuz Engine
            </p>
        </footer>
    </div>

    <style>
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>

    <script>
        // Sedikit interaksi: Console log untuk dev
        console.log("Sistem Stream sedang dalam pemeliharaan. Harap tunggu.");
    </script>
</body>
</html>
